name: Nightly upgrade

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    uses: ./.github/workflows/build.yml
    with:
      use_latest_nightly: true

  open-pr:
    needs: check # only runs if the whole suite passed on latest nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest nightly
        id: nightly
        # minimal profile is sufficient: this job only reads the version string.
        # Components for the actual checks (clippy/miri/rust-std) come from
        # rust-toolchain.toml in the `check` job, not here.
        run: |
          rustup toolchain install nightly --profile minimal
          VERSION=$(rustc +nightly --version) # e.g. "rustc 1.99.0-nightly (af3d95584 2026-07-12)"
          echo "date=$(echo "$VERSION" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')" >> "$GITHUB_OUTPUT"
          echo "hash=$(echo "$VERSION" | grep -oE '\(([0-9a-f]+) ' | tr -d '( ')" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Bump pin
        run: sed -i "s/^channel = .*/channel = \"nightly-${{ steps.nightly.outputs.date }}\"/" rust-toolchain.toml
      - uses: peter-evans/create-pull-request@v6
        with:
          branch: rust/nightly-upgrade
          base: main
          commit-message: "chore: bump nightly to ${{ steps.nightly.outputs.date }}"
          title: "Upgrade Rust nightly to ${{ steps.nightly.outputs.date }}"
          body: |
            Automated nightly bump: the full CI suite (build, test debug+release, clippy, rustfmt, miri) passed on this toolchain.

            | | |
            |---|---|
            | **Toolchain** | `nightly-${{ steps.nightly.outputs.date }}` |
            | **Version** | `${{ steps.nightly.outputs.version }}` |
            | **Upstream commit** | [`${{ steps.nightly.outputs.hash }}`](https://github.com/rust-lang/rust/commit/${{ steps.nightly.outputs.hash }}) |
            | **CI run** | [logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            Links:
            - [Component availability for this date](https://rust-lang.github.io/rustup-components-history/) (clippy / miri / rust-src / llvm-tools)
            - [Rust nightly changelog](https://github.com/rust-lang/rust/blob/master/RELEASES.md)
            - [This Week in Rust](https://this-week-in-rust.org/)
          delete-branch: true
